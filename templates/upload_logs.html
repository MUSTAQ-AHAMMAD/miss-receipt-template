<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Logs - Oracle Fusion Receipt Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .stat-card.success {
            border-left: 5px solid #10b981;
        }

        .stat-card.failed {
            border-left: 5px solid #ef4444;
        }

        .stat-card.pending {
            border-left: 5px solid #f59e0b;
        }

        .stat-card.info {
            border-left: 5px solid #3b82f6;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }

        .controls {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .controls-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .control-group label {
            font-size: 12px;
            color: #666;
            font-weight: 600;
        }

        select, button {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        button.secondary {
            background: #6b7280;
        }

        button.secondary:hover {
            background: #4b5563;
        }

        .logs-container {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .logs-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }

        .logs-header h2 {
            color: #333;
        }

        .logs-table {
            width: 100%;
            border-collapse: collapse;
        }

        .logs-table thead {
            background: #f9fafb;
        }

        .logs-table th {
            padding: 12px;
            text-align: left;
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            font-weight: 600;
            border-bottom: 2px solid #eee;
        }

        .logs-table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            color: #333;
        }

        .logs-table tbody tr:hover {
            background: #f9fafb;
            cursor: pointer;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-badge.success {
            background: #d1fae5;
            color: #065f46;
        }

        .status-badge.failed {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-badge.pending {
            background: #fef3c7;
            color: #92400e;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 10px;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }

        .modal-header {
            padding: 20px;
            border-bottom: 2px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            color: #333;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            color: #666;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            line-height: 30px;
        }

        .modal-body {
            padding: 20px;
        }

        .detail-section {
            margin-bottom: 20px;
        }

        .detail-section h4 {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 150px 1fr;
            gap: 10px;
        }

        .detail-label {
            font-weight: 600;
            color: #666;
        }

        .detail-value {
            color: #333;
        }

        .code-block {
            background: #f9fafb;
            border: 1px solid #eee;
            border-radius: 5px;
            padding: 15px;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 20px;
            color: #d1d5db;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .api-log-item {
            background: #f9fafb;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .api-log-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e5e7eb;
        }

        .http-method {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            background: #3b82f6;
            color: white;
        }

        .http-status {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
        }

        .http-status.success {
            background: #10b981;
            color: white;
        }

        .http-status.error {
            background: #ef4444;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📊 Upload Logs Dashboard</h1>
            <p>Track and monitor Oracle Fusion receipt upload status</p>
        </div>

        <!-- Statistics -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card info">
                <div class="stat-label">Total Uploads</div>
                <div class="stat-value" id="totalUploads">-</div>
            </div>
            <div class="stat-card success">
                <div class="stat-label">Successful</div>
                <div class="stat-value" id="successfulUploads">-</div>
            </div>
            <div class="stat-card failed">
                <div class="stat-label">Failed</div>
                <div class="stat-value" id="failedUploads">-</div>
            </div>
            <div class="stat-card pending">
                <div class="stat-label">Pending</div>
                <div class="stat-value" id="pendingUploads">-</div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <div class="controls-row">
                <div class="control-group">
                    <label>Filter by Status</label>
                    <select id="statusFilter">
                        <option value="">All Statuses</option>
                        <option value="SUCCESS">Success</option>
                        <option value="FAILED">Failed</option>
                        <option value="PENDING">Pending</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Filter by Type</label>
                    <select id="typeFilter">
                        <option value="">All Types</option>
                        <option value="STANDARD">Standard Receipt</option>
                        <option value="MISC">Misc Receipt</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>&nbsp;</label>
                    <button onclick="refreshLogs()">🔄 Refresh</button>
                </div>
                <div class="control-group">
                    <label>&nbsp;</label>
                    <button onclick="exportLogs()" class="secondary">📥 Export Report</button>
                </div>
            </div>
        </div>

        <!-- Logs Table -->
        <div class="logs-container">
            <div class="logs-header">
                <h2>Upload History</h2>
                <span id="recordCount"></span>
            </div>

            <div id="logsContent">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading upload logs...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Upload Details</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Content will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadStats();
            loadLogs();

            // Add event listeners
            document.getElementById('statusFilter').addEventListener('change', loadLogs);
            document.getElementById('typeFilter').addEventListener('change', loadLogs);
        });

        async function loadStats() {
            try {
                const response = await fetch('/api/upload-logs/stats');
                const data = await response.json();

                if (data.overall) {
                    document.getElementById('totalUploads').textContent = data.overall.total_uploads || 0;
                    document.getElementById('successfulUploads').textContent = data.overall.successful || 0;
                    document.getElementById('failedUploads').textContent = data.overall.failed || 0;
                    document.getElementById('pendingUploads').textContent = data.overall.pending || 0;
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        async function loadLogs() {
            const content = document.getElementById('logsContent');
            content.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading...</p></div>';

            try {
                const status = document.getElementById('statusFilter').value;
                const type = document.getElementById('typeFilter').value;

                let url = '/api/upload-logs/history?limit=100';
                if (status) url += `&status=${status}`;
                if (type) url += `&type=${type}`;

                const response = await fetch(url);
                const data = await response.json();

                if (data.history && data.history.length > 0) {
                    document.getElementById('recordCount').textContent = `${data.count} records`;
                    renderLogsTable(data.history);
                } else {
                    content.innerHTML = `
                        <div class="empty-state">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                            </svg>
                            <h3>No upload logs found</h3>
                            <p>Upload logs will appear here once receipts are uploaded to Oracle Fusion.</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading logs:', error);
                content.innerHTML = `
                    <div class="empty-state">
                        <p style="color: #ef4444;">Failed to load upload logs</p>
                    </div>
                `;
            }
        }

        function renderLogsTable(logs) {
            const content = document.getElementById('logsContent');

            const html = `
                <table class="logs-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Filename</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th>Rows</th>
                            <th>Amount</th>
                            <th>Error</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${logs.map(log => `
                            <tr onclick="showDetails(${log.id})">
                                <td>#${log.id}</td>
                                <td>${log.filename}</td>
                                <td>${log.receipt_type}</td>
                                <td>
                                    <span class="status-badge ${log.status.toLowerCase()}">
                                        ${log.status}
                                    </span>
                                </td>
                                <td>${formatDate(log.upload_date)}</td>
                                <td>${log.row_count || '-'}</td>
                                <td>${log.amount_total ? log.amount_total.toFixed(2) + ' SAR' : '-'}</td>
                                <td>${log.error_message ? truncate(log.error_message, 50) : '-'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            content.innerHTML = html;
        }

        async function showDetails(uploadId) {
            const modal = document.getElementById('detailModal');
            const body = document.getElementById('modalBody');

            body.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading details...</p></div>';
            modal.classList.add('show');

            try {
                const response = await fetch(`/api/upload-logs/details/${uploadId}`);
                const data = await response.json();

                renderDetails(data);
            } catch (error) {
                console.error('Error loading details:', error);
                body.innerHTML = '<div class="empty-state"><p style="color: #ef4444;">Failed to load details</p></div>';
            }
        }

        function renderDetails(data) {
            const body = document.getElementById('modalBody');

            let html = `
                <div class="detail-section">
                    <h4>Upload Information</h4>
                    <div class="detail-grid">
                        <div class="detail-label">Upload ID:</div>
                        <div class="detail-value">#${data.id}</div>

                        <div class="detail-label">Filename:</div>
                        <div class="detail-value">${data.filename}</div>

                        <div class="detail-label">Receipt Type:</div>
                        <div class="detail-value">${data.receipt_type}</div>

                        <div class="detail-label">Status:</div>
                        <div class="detail-value">
                            <span class="status-badge ${data.status.toLowerCase()}">${data.status}</span>
                        </div>

                        <div class="detail-label">Upload Date:</div>
                        <div class="detail-value">${formatDate(data.upload_date)}</div>

                        ${data.completed_date ? `
                            <div class="detail-label">Completed Date:</div>
                            <div class="detail-value">${formatDate(data.completed_date)}</div>
                        ` : ''}

                        ${data.row_count ? `
                            <div class="detail-label">Row Count:</div>
                            <div class="detail-value">${data.row_count}</div>
                        ` : ''}

                        ${data.amount_total ? `
                            <div class="detail-label">Total Amount:</div>
                            <div class="detail-value">${data.amount_total.toFixed(2)} SAR</div>
                        ` : ''}

                        ${data.payment_method ? `
                            <div class="detail-label">Payment Method:</div>
                            <div class="detail-value">${data.payment_method}</div>
                        ` : ''}

                        ${data.retry_count > 0 ? `
                            <div class="detail-label">Retry Count:</div>
                            <div class="detail-value">${data.retry_count}</div>
                        ` : ''}

                        ${data.error_message ? `
                            <div class="detail-label">Error Message:</div>
                            <div class="detail-value" style="color: #ef4444;">${data.error_message}</div>
                        ` : ''}

                        ${data.error_row ? `
                            <div class="detail-label">Error Row:</div>
                            <div class="detail-value">Row ${data.error_row}</div>
                        ` : ''}
                    </div>
                </div>
            `;

            if (data.api_logs && data.api_logs.length > 0) {
                html += `
                    <div class="detail-section">
                        <h4>API Request/Response Logs</h4>
                        ${data.api_logs.map(apiLog => `
                            <div class="api-log-item">
                                <div class="api-log-header">
                                    <div>
                                        <span class="http-method">${apiLog.http_method || 'POST'}</span>
                                        <span style="margin-left: 10px; color: #666; font-size: 12px;">
                                            ${apiLog.api_endpoint || 'N/A'}
                                        </span>
                                    </div>
                                    <div>
                                        ${apiLog.response_status ? `
                                            <span class="http-status ${apiLog.response_status < 300 ? 'success' : 'error'}">
                                                ${apiLog.response_status}
                                            </span>
                                        ` : ''}
                                        ${apiLog.duration_ms ? `
                                            <span style="margin-left: 10px; color: #666; font-size: 12px;">
                                                ${apiLog.duration_ms}ms
                                            </span>
                                        ` : ''}
                                    </div>
                                </div>

                                ${apiLog.request_payload ? `
                                    <div style="margin-bottom: 10px;">
                                        <strong style="font-size: 12px; color: #666;">Request Payload:</strong>
                                        <pre class="code-block">${formatJSON(apiLog.request_payload)}</pre>
                                    </div>
                                ` : ''}

                                ${apiLog.response_body ? `
                                    <div>
                                        <strong style="font-size: 12px; color: #666;">Response:</strong>
                                        <pre class="code-block">${formatJSON(apiLog.response_body)}</pre>
                                    </div>
                                ` : ''}
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            body.innerHTML = html;
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('show');
        }

        async function refreshLogs() {
            await loadStats();
            await loadLogs();
        }

        async function exportLogs() {
            try {
                const status = document.getElementById('statusFilter').value;

                const formData = new FormData();
                if (status) formData.append('status', status);

                const response = await fetch('/api/upload-logs/export', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Export failed');

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `upload_logs_${new Date().toISOString().split('T')[0]}.txt`;
                a.click();
                window.URL.revokeObjectURL(url);
            } catch (error) {
                console.error('Error exporting logs:', error);
                alert('Failed to export logs');
            }
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleString();
        }

        function truncate(str, length) {
            if (!str) return '';
            if (str.length <= length) return str;
            return str.substring(0, length) + '...';
        }

        function formatJSON(jsonStr) {
            try {
                const obj = typeof jsonStr === 'string' ? JSON.parse(jsonStr) : jsonStr;
                return JSON.stringify(obj, null, 2);
            } catch (e) {
                return jsonStr;
            }
        }

        // Close modal when clicking outside
        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
